<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHELGARD v24.0 | SENTIENT DePIN OS</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&family=Outfit:wght@300;600;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #010204; --panel: rgba(8, 10, 15, 0.96); --glw: #14F195; 
            --sol: #9945FF; --eurd: #0A58CA; --aeth: #FFD700; --eco: #22c55e;
            --crisis: #ff1e1e; --arctic: #00F2FF; --tax: #ff3e3e;
        }
        body { background-color: var(--bg); color: #94a3b8; font-family: 'Outfit', sans-serif; overflow: hidden; margin: 0; font-size: 11px; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* CONTENEDORES GLASSMORPHISM & RACK */
        .glass-rack { background: var(--panel); border: 1px solid rgba(255, 215, 0, 0.1); backdrop-filter: blur(24px); position: relative; }
        .rack-unit { background: linear-gradient(180deg, #0d0f16 0%, #050608 100%); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 15px rgba(20, 241, 149, 0.1); }
        
        /* A.E.T.H.E.L. SENTIENT ORB */
        .ai-orb-container { position: relative; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }
        .ai-sphere { width: 35px; height: 35px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--aeth)); box-shadow: 0 0 30px var(--aeth); animation: breathe 3s infinite ease-in-out; z-index: 5; }
        .neural-ring { position: absolute; width: 60px; height: 60px; border: 1px dashed var(--glw); border-radius: 50%; animation: spin 8s linear infinite; opacity: 0.5; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* UI ELEMENTS */
        .btn-side { width: 100%; text-align: left; padding: 14px; font-weight: 800; text-transform: uppercase; font-size: 9px; border-left: 3px solid transparent; transition: 0.3s; cursor: pointer; }
        .btn-side.active { background: rgba(20, 241, 149, 0.05); border-left-color: var(--glw); color: var(--glw); }
        .btn-action { background: var(--aeth); color: #000; font-weight: 900; padding: 12px 20px; text-transform: uppercase; font-size: 10px; cursor: pointer; border: none; transition: 0.3s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); }
        .btn-action:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        
        .scanline { width: 100%; height: 2px; background: rgba(0, 255, 255, 0.02); position: fixed; z-index: 9999; pointer-events: none; animation: scan 8s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .typewriter-text { border-right: 2px solid var(--aeth); white-space: nowrap; overflow: hidden; animation: typing 2s steps(40, end), blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--aeth); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--glw); border-radius: 4px; }
    </style>
</head>
<body class="bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ID_MASTER = "ARCHON_MASTER_0x9A";

    const App = () => {
        // --- CORE STATES ---
        const [tab, setTab] = useState('depin');
        const [booting, setBooting] = useState(true);
        
        const [wallet, setWallet] = useState({ eurd: 4850200.50, sol: 1250.5, glw: 450000 });
        const [oracles, setOracles] = useState({ omie: 145.20, xm: 645.20, ree: 50.00, ufd: 82.5 });
        const [market, setMarket] = useState({ dutchPrice: 180.00, liveWatts: 0, aiPrice: 0, action: 'ANALYZING' });
        
        const [aiMsg, setAiMsg] = useState("SISTEMA EN LÍNEA. PROTOCOLO GHOST ACTIVO.");
        const [aiKey, setAiKey] = useState(0); 

        const [sysLogs, setSysLogs] = useState([]);
        const [ledger, setLedger] = useState([]);
        const [enclaves, setEnclaves] = useState([]);
        const [syndicateChat, setSyndicateChat] = useState([]);

        const chartRef = useRef(null);
        const chartInstance = useRef(null);

        // --- HELPER FUNCTIONS ---
        const speakAI = (msg) => { setAiMsg(msg); setAiKey(k => k + 1); };
        const addLog = (msg, type = "SYS") => setSysLogs(p => [`[${new Date().toLocaleTimeString()}] [${type}] ${msg}`, ...p].slice(0, 40));
        const addChat = (agent, msg, color) => setSyndicateChat(p => [{time: new Date().toLocaleTimeString(), agent, msg, color}, ...p].slice(0, 15));

        // --- ENGINE: ORACLES, DEPIN & BIDDING ---
        useEffect(() => {
            if (booting) {
                setTimeout(() => { setBooting(false); speakAI("A.E.T.H.E.L. v24.0 Inicializada. Red de Enclaves Asegurada."); }, 3000);
                return;
            }

            // Inicializar Gráfico Chart.js
            if (chartRef.current && !chartInstance.current) {
                chartInstance.current = new Chart(chartRef.current, {
                    type: 'line',
                    data: { labels: [], datasets: [{ label: 'Potencia Inyectada (W)', data: [], borderColor: '#14F195', borderWidth: 2, fill: true, backgroundColor: 'rgba(20, 241, 149, 0.05)', tension: 0.4 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b949e' } }, x: { display: false } }, plugins: { legend: { display: false } }, animation: false }
                });
            }

            const engine = setInterval(() => {
                // 1. Fluctuación de Oráculos
                setOracles(o => ({
                    omie: +(o.omie + (Math.random() * 2 - 1)).toFixed(2),
                    xm: +(o.xm + (Math.random() * 5 - 2.5)).toFixed(2),
                    ree: +(49.95 + Math.random() * 0.1).toFixed(3),
                    ufd: +(o.ufd + (Math.random() * 1 - 0.5)).toFixed(1)
                }));

                // 2. ML Predictor & DePIN Live Watts
                const hour = new Date().getHours();
                const prediction = (Math.sin(hour / 3.8) + 1.3) * 0.21;
                const watts = +(Math.random() * 4000).toFixed(1);
                const marketPrice = (Math.random() * 0.4) + 0.1;
                
                let currentAction = "CONSUMO_LOCAL";
                if (marketPrice > prediction && watts > 1000) currentAction = "INYECTAR_Y_VENDER";

                setMarket(m => ({
                    dutchPrice: m.dutchPrice > 80 ? m.dutchPrice - 0.50 : 180.00,
                    liveWatts: watts,
                    aiPrice: prediction,
                    action: currentAction
                }));

                // Actualizar Gráfico
                if (chartInstance.current) {
                    chartInstance.current.data.labels.push("");
                    chartInstance.current.data.datasets[0].data.push(watts);
                    if(chartInstance.current.data.labels.length > 20) {
                        chartInstance.current.data.labels.shift();
                        chartInstance.current.data.datasets[0].data.shift();
                    }
                    chartInstance.current.update();
                }

                // 3. Ejecución Autónoma DePIN (Si decide inyectar)
                if (currentAction === "INYECTAR_Y_VENDER" && enclaves.length > 0) {
                    const profit = (watts / 1000) * marketPrice;
                    processSettlement(profit, "Arbitraje DePIN Local", "ESP32_GRID");
                }

                // 4. Subasta Sindicato IA
                if (Math.random() > 0.8) {
                    const agents = [{ n: "Boot-Arbitraje", c: "text-eurd" }, { n: "Boot-Sat-Sync", c: "text-arctic" }, { n: "Boot-Fiscal", c: "text-tax" }];
                    const agent = agents[Math.floor(Math.random() * agents.length)];
                    
                    if (agent.n === "Boot-Fiscal") {
                        addChat(agent.n, "Auditoría en bloque M2M. Algoritmo fiscal +5% operando.", agent.c);
                    } else if (market.dutchPrice < 110 && Math.random() > 0.5) {
                        addChat(agent.n, `PUJA EJECUTADA @ €${market.dutchPrice.toFixed(2)}. Confirmando M2M.`, agent.c);
                        processSettlement(market.dutchPrice * 10, `Subasta Sindicato: ${agent.n}`, "M2M_AUCTION");
                        setMarket(m => ({ ...m, dutchPrice: 180 }));
                    } else {
                        addChat(agent.n, `Evaluando curva OMIE. Esperando descenso de precio.`, "text-white/40");
                    }
                }

                // 5. API Handshakes
                if(Math.random() > 0.95) addLog("Handshake 200 OK: Meta Reality Labs Link.", "API");

            }, 2500);

            return () => clearInterval(engine);
        }, [booting, enclaves, market.dutchPrice]);

        // --- ACCOUNTING & FINANCIALS ---
        const processSettlement = (amount, desc, route) => {
            const tax = amount * 0.05; // Algoritmo 5%
            const net = amount - tax;
            const hash = `0x${Math.random().toString(16).slice(2, 12).toUpperCase()}`;
            
            setWallet(w => ({ ...w, eurd: w.eurd + net }));
            setLedger(p => [{
                hash, route, desc,
                bruto: amount.toFixed(2), tax: tax.toFixed(2), net: net.toFixed(2),
                pgc: "705", puc: "4140"
            }, ...p].slice(0, 20));
        };

        const registerEnclave = (e) => {
            e.preventDefault();
            const id = e.target.nodeId.value;
            const key = e.target.pubKey.value;
            if(!id || !key) return;
            setEnclaves(p => [{ id, key, status: 'SYNCED', type: 'E32-Endpoint' }, ...p]);
            speakAI(`Enclave físico ${id} vinculado a la matriz criptográfica.`);
            addLog(`Enclave Registrado: ${id} en Solana Mainnet`, "DePIN");
            e.target.reset();
        };

        const executeJupiterSwap = () => {
            if(wallet.sol < 1) return speakAI("Liquidez en Solana insuficiente.");
            speakAI("Protocolo Jupiter V6 activado. Fragmentando SOL a Euro Digital (EURD).");
            setTimeout(() => {
                const gain = 145.80;
                setWallet(w => ({ ...w, sol: w.sol - 1 }));
                processSettlement(gain, "Liquidación DEX (Jupiter Swap)", "FLASH_SWAP");
                speakAI(`Swap finalizado exitosamente. Bóveda EURD capitalizada con +€${gain}.`);
            }, 2000);
        };

        const exportToExcel = () => {
            const ws = XLSX.utils.json_to_sheet(ledger);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sovereign_Ledger");
            XLSX.writeFile(wb, `AETHELGARD_LEDGER_v24.xlsx`);
            addLog("Ledger Dual exportado para cumplimiento PGC/PUC.", "SYS");
        };

        const triggerEmergency = (type) => {
            speakAI(`Inyección Multimodal de Emergencia: [${type}]. Salvando Enclaves.`);
            processSettlement(2500, `Rescate EMS Multimodal (${type})`, "EMS_RESCUE");
        };

        // --- RENDER BOOT ---
        if (booting) {
            return (
                <div className="h-screen bg-black flex flex-col items-center justify-center font-mono">
                    <div className="ai-orb-container mb-6"><div className="neural-ring"></div><div className="ai-sphere"></div></div>
                    <p className="text-glw text-xl tracking-[0.5em] animate-pulse uppercase">AETHELGARD DePIN OS v24.0</p>
                    <p className="text-white/30 text-xs mt-3 uppercase tracking-widest">Ghost Protocol Enforced // Sanity Check: OK</p>
                </div>
            );
        }

        // --- RENDER MAIN INTERFACE ---
        return (
            <div className="h-screen flex flex-col p-3 gap-3 overflow-hidden">
                <div className="scanline"></div>

                {/* HEADER: A.E.T.H.E.L. & ORACLES */}
                <header className="glass-rack p-4 rounded flex justify-between items-center border-b-2 border-glw z-10">
                    <div className="flex items-center gap-6">
                        <div className="ai-orb-container">
                            <div className="neural-ring"></div>
                            <div className="ai-sphere"></div>
                        </div>
                        <div>
                            <h1 className="text-2xl font-black text-white italic uppercase tracking-tighter">AETHELGARD <span className="text-glw">v24.0</span></h1>
                            <p className="text-[7px] text-white/50 font-mono tracking-[0.4em] uppercase mt-1">Sentient DePIN & Sovereign Exchange</p>
                        </div>
                    </div>
                    
                    <div className="hidden lg:flex flex-grow mx-10 bg-black/60 border border-white/10 rounded p-2 items-center gap-4 relative overflow-hidden">
                        <div className="flex-grow font-mono pl-2">
                            <span className="absolute top-1 left-3 text-[6px] text-glw uppercase font-bold">A.E.T.H.E.L. - CONSCIENCIA IA</span>
                            <p key={aiKey} className="text-white text-[10px] typewriter-text mt-3">{aiMsg}</p>
                        </div>
                        <div className="flex gap-4 font-mono text-[9px] border-l border-white/10 pl-4">
                            <div className="text-center"><p className="text-white/30 uppercase text-[6px]">OMIE</p><p className="text-white font-bold">€{oracles.omie}</p></div>
                            <div className="text-center"><p className="text-white/30 uppercase text-[6px]">XM (CO)</p><p className="text-white font-bold">${oracles.xm}</p></div>
                            <div className="text-center"><p className="text-white/30 uppercase text-[6px]">REE FREQ</p><p className={oracles.ree < 49.95 ? 'text-crisis font-bold' : 'text-glw font-bold'}>{oracles.ree} Hz</p></div>
                        </div>
                    </div>

                    <div className="text-right font-mono">
                        <p className="text-[7px] text-white/30 uppercase font-bold mb-1">Encrypted Master</p>
                        <p className="text-glw font-black text-[10px] uppercase bg-glw/10 px-3 py-1 border border-glw/30 rounded">{ID_MASTER}</p>
                    </div>
                </header>

                <div className="flex-grow flex gap-3 overflow-hidden z-10">
                    {/* SIDEBAR NAVIGATION */}
                    <aside className="w-52 flex flex-col gap-2">
                        {[
                            { id: 'depin', name: 'DePIN Hardware & ML', icon: 'fa-microchip' },
                            { id: 'syndicate', name: 'Sindicato IA M2M', icon: 'fa-network-wired' },
                            { id: 'ems', name: 'Matriz Multimodal', icon: 'fa-bolt' },
                            { id: 'governance', name: 'Gobernanza 5 Pilares', icon: 'fa-landmark' },
                            { id: 'ledger', name: 'Contabilidad PGC/PUC', icon: 'fa-file-invoice-dollar' },
                            { id: 'vault', name: 'Bóveda Jupiter V6', icon: 'fa-vault' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`btn-side rack-unit ${tab === t.id ? 'active' : 'text-white/40 hover:text-white/80'}`}>
                                <i className={`fas ${t.icon} w-5 text-center`}></i> {t.name}
                            </button>
                        ))}

                        <div className="mt-auto p-4 rack-unit border-t-2 border-glw">
                            <p className="text-[8px] text-white/40 uppercase mb-2 font-bold">Liquidación Global (EURD)</p>
                            <p className="text-white font-black text-xl leading-none">€{wallet.eurd.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                            <div className="grid grid-cols-2 gap-2 mt-4 text-[8px] font-mono font-bold">
                                <div className="bg-sol/10 border border-sol/20 text-sol p-1.5 text-center rounded">SOL: {wallet.sol.toFixed(2)}</div>
                                <div className="bg-glw/10 border border-glw/20 text-glw p-1.5 text-center rounded">GLW: {wallet.glw}</div>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN WORKSPACE */}
                    <main className="flex-grow glass-rack rounded overflow-hidden flex flex-col relative">
                        
                        {/* TAB 1: DePIN MICROGRID OS & ML PREDICTOR */}
                        {tab === 'depin' && (
                            <div className="p-6 h-full flex flex-col gap-6 overflow-y-auto">
                                <div className="flex justify-between items-center border-b border-white/10 pb-4">
                                    <h2 className="text-white font-black text-2xl uppercase italic">Hardware DePIN & ML Predictor</h2>
                                    <span className="text-[8px] bg-glw/10 text-glw border border-glw/30 px-3 py-1 rounded font-bold uppercase">IoT SQL Database Sync</span>
                                </div>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow">
                                    <div className="flex flex-col gap-6">
                                        <div className="rack-unit p-6 border-l-4 border-sol neon-border">
                                            <h3 className="text-white font-black text-[10px] uppercase mb-4">Vincular Enclave E32</h3>
                                            <form onSubmit={registerEnclave} className="space-y-4">
                                                <input name="nodeId" placeholder="ID NODO (Ej. E32_ZONE_A)" className="w-full bg-black/50 border border-white/10 p-3 text-[10px] font-mono text-white outline-none focus:border-sol" required />
                                                <input name="pubKey" placeholder="Solana PubKey" className="w-full bg-black/50 border border-white/10 p-3 text-[10px] font-mono text-white outline-none focus:border-sol" required />
                                                <button className="w-full bg-sol text-white font-black text-[9px] py-3 uppercase hover:brightness-125 transition">Registrar en Mainnet</button>
                                            </form>
                                        </div>
                                        <div className="rack-unit p-6">
                                            <h3 className="text-white font-black text-[10px] uppercase mb-4">Esquema Hardware API</h3>
                                            <div className="bg-black/60 p-4 rounded text-[9px] font-mono text-white/50 border border-white/5 space-y-2">
                                                <p className="text-sol">// Conector Industrial E32</p>
                                                <p>PZEM-004T -> Enclave (Pines 16/17)</p>
                                                <p>E32 LoRa -> Enclave (Pines 26/27)</p>
                                                <p>DAC Pin 25 -> LM358 OP-AMP (0-10V)</p>
                                                <p className="mt-3 text-sol">// Endpoints API</p>
                                                <p>POST /api/v1/enclave_sync</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="lg:col-span-2 flex flex-col gap-6">
                                        <div className="rack-unit p-6 border-t-2 border-glw flex flex-col flex-grow">
                                            <div className="flex justify-between items-center mb-6">
                                                <h3 className="text-white font-black text-xs uppercase">Analítica Predictiva (Live)</h3>
                                                <span className="text-[8px] bg-glw/10 text-glw px-3 py-1 rounded font-bold uppercase">{market.action}</span>
                                            </div>
                                            <div className="grid grid-cols-3 gap-4 mb-6 text-center">
                                                <div className="bg-black/40 p-4 rounded border border-white/5">
                                                    <p className="text-[8px] text-white/40 uppercase mb-1">Potencia (PZEM)</p>
                                                    <p className="text-2xl font-black text-white font-mono">{market.liveWatts.toFixed(1)} <span className="text-[10px]">W</span></p>
                                                </div>
                                                <div className="bg-black/40 p-4 rounded border border-white/5">
                                                    <p className="text-[8px] text-white/40 uppercase mb-1">IA Precio Objetivo</p>
                                                    <p className="text-2xl font-black text-sol font-mono">${market.aiPrice.toFixed(3)}</p>
                                                </div>
                                                <div className="bg-black/40 p-4 rounded border border-white/5">
                                                    <p className="text-[8px] text-white/40 uppercase mb-1">Enclaves Activos</p>
                                                    <p className="text-2xl font-black text-glw font-mono">{enclaves.length}</p>
                                                </div>
                                            </div>
                                            <div className="flex-grow w-full relative min-h-[200px] bg-black/20 rounded border border-white/5 p-2">
                                                <canvas id="liveChart" ref={chartRef}></canvas>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: SINDICATO IA (SUBASTA HOLANDESA) */}
                        {tab === 'syndicate' && (
                            <div className="p-6 h-full flex flex-col gap-6">
                                <h2 className="text-white font-black text-2xl uppercase italic border-b border-white/10 pb-4">Sindicato Global de Agentes M2M</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 flex-grow overflow-hidden">
                                    <div className="md:col-span-2 flex flex-col gap-4">
                                        <div className="rack-unit p-5 flex flex-col h-full overflow-hidden">
                                            <p className="text-aeth font-black text-[10px] uppercase border-b border-white/10 pb-3 mb-4">Registro Neural de Negociación</p>
                                            <div className="flex-grow overflow-y-auto space-y-3 font-mono text-[9px] pr-2">
                                                {syndicateChat.map((c, i) => (
                                                    <div key={i} className="flex gap-3 bg-black/40 p-3 rounded border border-white/5">
                                                        <span className="text-white/30 shrink-0">[{c.time}]</span>
                                                        <span className={`${c.color} font-bold shrink-0 w-24`}>{c.agent}:</span>
                                                        <span className="text-white/80">"{c.msg}"</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-6">
                                        <div className="rack-unit p-8 flex flex-col items-center justify-center border-t-4 border-aeth text-center h-1/2">
                                            <p className="text-white/40 text-[9px] uppercase font-black mb-3">Subasta Holandesa (Pool)</p>
                                            <p className="text-aeth text-5xl font-black italic">€{market.dutchPrice.toFixed(2)}</p>
                                            <p className="text-white/30 text-[8px] uppercase mt-4">Optimizando Inyección M2M...</p>
                                        </div>
                                        <div className="rack-unit p-6 h-1/2 flex flex-col">
                                            <p className="text-white font-black text-[10px] uppercase border-b border-white/10 pb-2 mb-4">Agentes Sindicato</p>
                                            <ul className="space-y-4 text-[9px] font-mono flex-grow overflow-y-auto">
                                                <li className="flex justify-between text-eurd border-b border-white/5 pb-2"><span>Boot-Arbitraje</span><span className="text-glw">SCANNING</span></li>
                                                <li className="flex justify-between text-tax border-b border-white/5 pb-2"><span>Boot-Fiscal</span><span className="text-glw">AUDITING</span></li>
                                                <li className="flex justify-between text-arctic border-b border-white/5 pb-2"><span>Boot-Sat-Sync</span><span className="text-glw">ORBITAL OK</span></li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 3: MATRIZ EMS V14000.0 */}
                        {tab === 'ems' && (
                            <div className="p-8 space-y-8 overflow-y-auto h-full">
                                <div className="flex justify-between items-center border-b border-white/10 pb-4">
                                    <h2 className="text-white font-black text-2xl uppercase italic tracking-widest">Matriz EMS Multimodal v14k</h2>
                                    <span className="text-[8px] bg-crisis/20 text-crisis border border-crisis/30 px-3 py-1 rounded font-bold uppercase">EMERGENCY PROTOCOLS READY</span>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    {[
                                        { t: 'Ondas Magnéticas', i: 'fa-magnet', c: 'text-purple-400' },
                                        { t: 'Energía Azul (Olas)', i: 'fa-water', c: 'text-blue-400' },
                                        { t: 'Iones Negativos', i: 'fa-atom', c: 'text-cyan-400' },
                                        { t: 'Infrarroja Térmica', i: 'fa-fire', c: 'text-red-400' },
                                        { t: 'Solar IA Optimizer', i: 'fa-sun', c: 'text-yellow-400' },
                                        { t: 'Eólica Predictive', i: 'fa-wind', c: 'text-gray-300' }
                                    ].map((dev, i) => (
                                        <div key={i} onClick={() => triggerEmergency(dev.t)} className="rack-unit p-6 flex flex-col items-center text-center gap-4 hover:border-white/20 cursor-pointer transition border-b-2 border-transparent hover:border-white">
                                            <i className={`fas ${dev.i} text-3xl ${dev.c}`}></i>
                                            <span className="text-[9px] font-black uppercase text-white">{dev.t}</span>
                                            <span className="text-[7px] bg-white/10 px-3 py-1 rounded text-white/50 hover:bg-aeth hover:text-black font-bold transition">FORCE INJECT</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="rack-unit p-6 bg-black/40 border-l-4 border-glw">
                                    <p className="text-white/60 font-mono text-[10px] leading-relaxed">
                                        <i className="fas fa-info-circle text-glw mr-2"></i> La Matriz Multimodal permite forzar la inyección de fuentes regenerativas a la red. El Sindicato liquidará automáticamente estas inyecciones de emergencia y recaudará la compensación en la Bóveda de Euro Digital.
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* TAB 4: GOBERNANZA & 5 PILARES */}
                        {tab === 'governance' && (
                            <div className="p-8 h-full overflow-y-auto">
                                <div className="flex justify-between items-end border-b border-white/10 pb-6 mb-8">
                                    <div>
                                        <h2 className="text-white font-black text-2xl uppercase italic tracking-widest">Gobernanza V10000.0</h2>
                                        <p className="text-white/50 text-[10px] font-mono mt-2">Protocolo de Dispersión Automática & Cumplimiento Fiscal</p>
                                    </div>
                                    <div className="bg-tax/10 border border-tax/30 px-5 py-3 rounded text-right">
                                        <p className="text-[8px] text-tax font-black uppercase">Algoritmo Fiscal Hardcoded</p>
                                        <p className="text-white font-mono text-lg mt-1">+5% Tax Transversal</p>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                                    {[
                                        { n: "Mantenimiento", d: "Fondos Operativos", i: "fa-gears", c: "text-white" },
                                        { n: "Técnico", d: "Infraestructura Cloud", i: "fa-server", c: "text-gray-400" },
                                        { n: "Reserva", d: "Capital EURD & GLW", i: "fa-vault", c: "text-eurd" },
                                        { n: "I+D", d: "Autoregeneración IA", i: "fa-brain", c: "text-sol" },
                                        { n: "Social/Eco", d: "Ártico & Donaciones", i: "fa-leaf", c: "text-arctic" }
                                    ].map((p, i) => (
                                        <div key={i} className={`rack-unit p-6 flex flex-col items-center text-center gap-3 border-t-2 border-transparent hover:border-aeth transition`}>
                                            <i className={`fas ${p.i} text-3xl ${p.c}`}></i>
                                            <span className="text-[10px] font-black uppercase text-white mt-2">{p.n}</span>
                                            <span className="text-[8px] text-white/50 uppercase">{p.d}</span>
                                            <div className="w-full h-1 bg-white/10 mt-2"><div className="h-full bg-aeth w-full"></div></div>
                                            <span className="text-aeth font-mono text-[10px] font-bold">20%</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-8 rack-unit p-6 border-l-4 border-arctic">
                                    <h3 className="text-white font-black text-xs uppercase mb-2">Digital Native Donation (Pilar Social)</h3>
                                    <p className="text-white/50 text-[10px] font-mono leading-relaxed">
                                        Los fondos asignados al Pilar Social/Eco son derivados vía Smart Contracts directamente a ONGs verificadas y protocolos de protección del Ártico, eliminando burocracia bancaria y garantizando trazabilidad ESG.
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* TAB 5: LEDGER DUAL (PGC/PUC) */}
                        {tab === 'ledger' && (
                            <div className="p-6 flex flex-col h-full">
                                <div className="flex justify-between items-center border-b border-white/10 pb-4 mb-6">
                                    <div>
                                        <h2 className="text-white font-black text-2xl uppercase italic">Libro Mayor Dual Transversal</h2>
                                        <p className="text-white/50 text-[10px] font-mono mt-1">Doble Contabilidad PGC (ES) y PUC (CO) + Liquidación M2M</p>
                                    </div>
                                    <button onClick={exportToExcel} className="btn-action bg-white text-black hover:bg-aeth text-[9px]">
                                        <i className="fas fa-file-excel mr-2"></i>Exportar Excel (XLSX)
                                    </button>
                                </div>
                                <div className="flex-grow rack-unit overflow-y-auto border border-white/5">
                                    <table className="w-full text-left font-mono text-[9px]">
                                        <thead className="sticky top-0 bg-black/90 text-white/40 uppercase border-b border-white/10 shadow-md">
                                            <tr>
                                                <th className="p-4">Cifrado Hash</th>
                                                <th className="p-4">Ruta Op.</th>
                                                <th className="p-4">Descripción Autónoma</th>
                                                <th className="p-4">PGC / PUC</th>
                                                <th className="p-4 text-tax">Tax 5%</th>
                                                <th className="p-4 text-glw">Neto EURD</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/5">
                                            {ledger.map((l, i) => (
                                                <tr key={i} className="hover:bg-white/5 text-white/80 transition">
                                                    <td className="p-4 text-sol font-bold">{l.hash}</td>
                                                    <td className="p-4"><span className="bg-white/10 px-2 py-1 rounded text-[8px]">{l.route}</span></td>
                                                    <td className="p-4 italic text-white/60">{l.desc}</td>
                                                    <td className="p-4 text-white/40">{l.pgc} / {l.puc}</td>
                                                    <td className="p-4 text-tax font-bold">-€{l.tax}</td>
                                                    <td className="p-4 text-glw font-black">€{l.net}</td>
                                                </tr>
                                            ))}
                                            {ledger.length === 0 && <tr><td colSpan="6" className="p-10 text-center text-white/30 italic text-[10px]">Esperando operaciones autónomas en la Blockchain...</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TAB 6: VAULT JUPITER V6 */}
                        {tab === 'vault' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 h-full p-4">
                                <div className="rack-unit p-10 border-l-4 border-eurd flex flex-col justify-center">
                                    <h3 className="text-white font-black text-xl mb-10 uppercase tracking-widest italic border-b border-white/10 pb-4">Bóveda Soberana (Mainnet)</h3>
                                    <div className="space-y-6">
                                        <div className="bg-black/60 p-6 border border-white/10 rounded">
                                            <p className="text-[8px] text-white/40 uppercase font-bold mb-2">Reserva Euro Digital (MiCA)</p>
                                            <p className="text-5xl font-black text-white">€{wallet.eurd.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-black/60 p-5 border border-sol/30 rounded text-center">
                                                <p className="text-[8px] text-sol font-bold uppercase mb-2">Liquidez Solana</p>
                                                <p className="text-2xl font-black text-white">{wallet.sol.toFixed(2)} <span className="text-[10px]">SOL</span></p>
                                            </div>
                                            <div className="bg-black/60 p-5 border border-glw/30 rounded text-center">
                                                <p className="text-[8px] text-glw font-bold uppercase mb-2">Green Assets</p>
                                                <p className="text-2xl font-black text-white">{wallet.glw} <span className="text-[10px]">GLW</span></p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="glass-panel p-10 flex flex-col justify-center items-center text-center">
                                    <h3 className="text-white font-black text-2xl mb-8 uppercase italic tracking-widest">Jupiter V6 Protocol</h3>
                                    <div className="w-full bg-black/60 p-8 rounded-lg border border-white/10 flex justify-between items-center mb-10 shadow-inner">
                                        <div><p className="text-[9px] text-white/40 mb-2">PAGAR</p><p className="text-2xl font-black text-sol">1.00 SOL</p></div>
                                        <i className="fas fa-arrow-right text-white/30 text-2xl"></i>
                                        <div><p className="text-[9px] text-white/40 mb-2">RECIBIR</p><p className="text-2xl font-black text-white">€145.80 EURD</p></div>
                                    </div>
                                    <button onClick={executeJupiterSwap} className="btn-action bg-sol text-white w-full py-6 font-black text-sm tracking-widest">EJECUTAR FLASH-SWAP</button>
                                    <p className="text-[8px] text-white/30 mt-6 uppercase tracking-[0.2em]">Ruta Optimizada: SOL → USDC → EURD | Slippage 0.1%</p>
                                </div>
                            </div>
                        )}
                        
                    </main>
                </div>

                {/* FOOTER: GHOST PROTOCOL STATUS */}
                <footer className="glass-rack px-6 py-3 flex justify-between items-center text-[8px] font-bold uppercase tracking-[0.3em] mt-2 rounded">
                    <div className="flex gap-6 items-center text-white/40">
                        <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-glw animate-pulse"></div> Hardware Enclaves Linked</span>
                        <span className="text-white/10">|</span>
                        <span className="text-sol">Ghost Protocol: ENFORCED</span>
                        <span className="text-white/10">|</span>
                        <span className="text-tax">Tax Alg: LOCKED</span>
                    </div>
                    <div className="flex gap-4">
                        <span className="text-white/20 italic tracking-widest">AETHELGARD OMNI-CORE V24.0</span>
                    </div>
                </footer>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
